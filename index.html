<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 益智游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #faf8ef 0%, #ede0c8 100%);
            font-family: 'Arial', sans-serif;
        }
        h1 {
            color: #776e65;
            margin-bottom: 20px;
            font-size: 48px;
        }
        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .score-box .label {
            color: #eee4da;
            font-size: 14px;
            text-transform: uppercase;
        }
        .score-box .value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }
        #gameBoard {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 12px;
            background: #bbada0;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            transition: all 0.15s ease;
        }
        .cell-2 { background: #eee4da; color: #776e65; }
        .cell-4 { background: #ede0c8; color: #776e65; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; }
        .cell-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; }
        .cell-512 { background: #edc850; color: #f9f6f2; font-size: 32px; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; font-size: 28px; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; font-size: 28px; }
        .cell-super { background: #3c3a32; color: #f9f6f2; font-size: 24px; }
        
        .controls {
            margin-top: 20px;
            color: #776e65;
            text-align: center;
        }
        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            background: #8f7a66;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(143, 122, 102, 0.6);
        }
        #gameOver, #gameWin {
            position: absolute;
            font-size: 36px;
            color: #776e65;
            display: none;
            z-index: 100;
            background: rgba(250, 248, 239, 0.9);
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }
        .key {
            display: inline-block;
            padding: 5px 12px;
            background: #8f7a66;
            color: #fff;
            border-radius: 5px;
            margin: 3px;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="game-info">
        <div class="score-box">
            <div class="label">分数</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="label">最高分</div>
            <div class="value" id="bestScore">0</div>
        </div>
    </div>
    <div id="gameBoard"></div>
    <div id="gameOver"></div>
    <div id="gameWin"></div>
    <div class="controls">
        使用 <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> 或滑动移动方块
        <br>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const boardEl = document.getElementById('gameBoard');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const gameOverDiv = document.getElementById('gameOver');
        const gameWinDiv = document.getElementById('gameWin');

        // 游戏配置
        const SIZE = 4;
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore2048') || 0;
        let gameWon = false;
        let gameLost = false;

        bestScoreEl.textContent = bestScore;

        // 初始化游戏
        function initGame() {
            board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            gameWon = false;
            gameLost = false;
            
            gameOverDiv.style.display = 'none';
            gameWinDiv.style.display = 'none';
            scoreEl.textContent = score;

            addNewTile();
            addNewTile();
            render();
        }

        // 添加新方块
        function addNewTile() {
            const emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }

            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 渲染游戏板
        function render() {
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const value = board[r][c];
                    
                    if (value > 0) {
                        cell.textContent = value;
                        cell.classList.add(value <= 2048 ? `cell-${value}` : 'cell-super');
                    }
                    
                    boardEl.appendChild(cell);
                }
            }
        }

        // 向左移动
        function moveLeft() {
            let moved = false;
            let merged = Array(SIZE).fill(null).map(() => Array(SIZE).fill(false));

            for (let r = 0; r < SIZE; r++) {
                for (let c = 1; c < SIZE; c++) {
                    if (board[r][c] !== 0) {
                        let newC = c;
                        while (newC > 0 && board[r][newC - 1] === 0) {
                            newC--;
                        }

                        if (newC > 0 && board[r][newC - 1] === board[r][c] && !merged[r][newC - 1]) {
                            board[r][newC - 1] *= 2;
                            score += board[r][newC - 1];
                            board[r][c] = 0;
                            merged[r][newC - 1] = true;
                            moved = true;

                            if (board[r][newC - 1] === 2048 && !gameWon) {
                                gameWon = true;
                                showGameWin();
                            }
                        } else if (newC !== c) {
                            board[r][newC] = board[r][c];
                            board[r][c] = 0;
                            moved = true;
                        }
                    }
                }
            }

            return moved;
        }

        // 向右移动
        function moveRight() {
            let moved = false;
            let merged = Array(SIZE).fill(null).map(() => Array(SIZE).fill(false));

            for (let r = 0; r < SIZE; r++) {
                for (let c = SIZE - 2; c >= 0; c--) {
                    if (board[r][c] !== 0) {
                        let newC = c;
                        while (newC < SIZE - 1 && board[r][newC + 1] === 0) {
                            newC++;
                        }

                        if (newC < SIZE - 1 && board[r][newC + 1] === board[r][c] && !merged[r][newC + 1]) {
                            board[r][newC + 1] *= 2;
                            score += board[r][newC + 1];
                            board[r][c] = 0;
                            merged[r][newC + 1] = true;
                            moved = true;

                            if (board[r][newC + 1] === 2048 && !gameWon) {
                                gameWon = true;
                                showGameWin();
                            }
                        } else if (newC !== c) {
                            board[r][newC] = board[r][c];
                            board[r][c] = 0;
                            moved = true;
                        }
                    }
                }
            }

            return moved;
        }

        // 向上移动
        function moveUp() {
            let moved = false;
            let merged = Array(SIZE).fill(null).map(() => Array(SIZE).fill(false));

            for (let c = 0; c < SIZE; c++) {
                for (let r = 1; r < SIZE; r++) {
                    if (board[r][c] !== 0) {
                        let newR = r;
                        while (newR > 0 && board[newR - 1][c] === 0) {
                            newR--;
                        }

                        if (newR > 0 && board[newR - 1][c] === board[r][c] && !merged[newR - 1][c]) {
                            board[newR - 1][c] *= 2;
                            score += board[newR - 1][c];
                            board[r][c] = 0;
                            merged[newR - 1][c] = true;
                            moved = true;

                            if (board[newR - 1][c] === 2048 && !gameWon) {
                                gameWon = true;
                                showGameWin();
                            }
                        } else if (newR !== r) {
                            board[newR][c] = board[r][c];
                            board[r][c] = 0;
                            moved = true;
                        }
                    }
                }
            }

            return moved;
        }

        // 向下移动
        function moveDown() {
            let moved = false;
            let merged = Array(SIZE).fill(null).map(() => Array(SIZE).fill(false));

            for (let c = 0; c < SIZE; c++) {
                for (let r = SIZE - 2; r >= 0; r--) {
                    if (board[r][c] !== 0) {
                        let newR = r;
                        while (newR < SIZE - 1 && board[newR + 1][c] === 0) {
                            newR++;
                        }

                        if (newR < SIZE - 1 && board[newR + 1][c] === board[r][c] && !merged[newR + 1][c]) {
                            board[newR + 1][c] *= 2;
                            score += board[newR + 1][c];
                            board[r][c] = 0;
                            merged[newR + 1][c] = true;
                            moved = true;

                            if (board[newR + 1][c] === 2048 && !gameWon) {
                                gameWon = true;
                                showGameWin();
                            }
                        } else if (newR !== r) {
                            board[newR][c] = board[r][c];
                            board[r][c] = 0;
                            moved = true;
                        }
                    }
                }
            }

            return moved;
        }

        // 检查游戏是否结束
        function checkGameOver() {
            // 检查是否有空格
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) return false;
                }
            }

            // 检查是否有可以合并的相邻方块
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                    if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                }
            }

            return true;
        }

        // 显示游戏结束
        function showGameOver() {
            gameLost = true;
            gameOverDiv.textContent = '游戏结束！';
            gameOverDiv.style.display = 'block';
            gameOverDiv.style.top = '50%';
            gameOverDiv.style.left = '50%';
            gameOverDiv.style.transform = 'translate(-50%, -50%)';
        }

        // 显示胜利
        function showGameWin() {
            gameWinDiv.textContent = '恭喜达到 2048！';
            gameWinDiv.style.display = 'block';
            gameWinDiv.style.top = '50%';
            gameWinDiv.style.left = '50%';
            gameWinDiv.style.transform = 'translate(-50%, -50%)';
        }

        // 更新分数
        function updateScore() {
            scoreEl.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreEl.textContent = bestScore;
                localStorage.setItem('bestScore2048', bestScore);
            }
        }

        // 重新开始
        function restartGame() {
            initGame();
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (gameLost) return;

            let moved = false;

            switch (e.key) {
                case 'ArrowLeft':
                    moved = moveLeft();
                    break;
                case 'ArrowRight':
                    moved = moveRight();
                    break;
                case 'ArrowUp':
                    moved = moveUp();
                    break;
                case 'ArrowDown':
                    moved = moveDown();
                    break;
                default:
                    return;
            }

            e.preventDefault();

            if (moved) {
                addNewTile();
                render();
                updateScore();

                if (checkGameOver()) {
                    showGameOver();
                }
            }
        });

        // 触摸事件（滑动）
        let touchStartX = 0;
        let touchStartY = 0;

        boardEl.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        boardEl.addEventListener('touchend', (e) => {
            if (gameLost) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            let moved = false;

            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (dx > 50) {
                    moved = moveRight();
                } else if (dx < -50) {
                    moved = moveLeft();
                }
            } else {
                // 垂直滑动
                if (dy > 50) {
                    moved = moveDown();
                } else if (dy < -50) {
                    moved = moveUp();
                }
            }

            if (moved) {
                e.preventDefault();
                addNewTile();
                render();
                updateScore();

                if (checkGameOver()) {
                    showGameOver();
                }
            }
        });

        // 启动游戏
        initGame();
    </script>
</body>
</html>
